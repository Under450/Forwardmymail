<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terms &amp; Conditions - Forward My Mail</title>
  <meta name="description" content="Forward My Mail Ltd - full Terms and Conditions (UK)">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #f5f7fa;
      color: #222;
      line-height: 1.65;
      padding: 30px 20px 60px;
    }
    .wrap { max-width: 880px; margin: 0 auto; background: #fff; border-radius: 14px; box-shadow: 0 12px 40px rgba(0,0,0,0.08); padding: 50px 50px 60px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #e0e6ef; }
    .topbar img { height: 40px; }
    .topbar a.home { color: #1e3c72; text-decoration: none; font-size: 14px; font-weight: 500; }
    .topbar a.home:hover { text-decoration: underline; }
    .meta { background: #f0f4fa; border-left: 4px solid #1e3c72; padding: 14px 18px; margin: 0 0 30px; border-radius: 6px; font-size: 14px; color: #444; }
    .meta strong { color: #1e3c72; }
    h2 { font-size: 24px; color: #0c1e3c; margin: 28px 0 14px; }
    h3 { font-size: 18px; color: #1e3c72; margin: 26px 0 10px; padding-bottom: 6px; border-bottom: 1px solid #e0e6ef; }
    p { margin-bottom: 12px; }
    ul, ol { margin: 10px 0 14px 22px; }
    li { margin-bottom: 6px; }
    table { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 14px; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #e0e6ef; }
    th { background: #f0f4fa; color: #1e3c72; font-weight: 600; }
    a { color: #1e3c72; }
    .print-bar { text-align: right; margin-bottom: 16px; }
    .print-bar button { background: #1e3c72; color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .print-bar button:hover { background: #2a5298; }
    @media print {
      body { background: #fff; padding: 0; }
      .wrap { box-shadow: none; padding: 0; max-width: 100%; }
      .topbar, .print-bar { display: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <img src="logo.png" alt="Forward My Mail">
      <a href="index.html" class="home">&larr; Back to forwardmymail.co.uk</a>
    </div>
    <div class="meta">
      <strong>Document:</strong> Forward My Mail Ltd - Master Agreement (consolidated)<br>
      <strong>Version:</strong> <span id="v"></span><br>
      <strong>Last updated:</strong> <span id="d"></span>
    </div>
    <div class="print-bar">
      <a href="FMM_Master_Agreement_v4.pdf" download style="display:inline-block;background:#1e3c72;color:#fff;text-decoration:none;padding:8px 16px;border-radius:6px;font-size:13px;margin-right:6px">Download official PDF</a>
      <button onclick="window.print()">Print this page</button>
    </div>
    <div id="termsContent"></div>
  </div>
  <script src="terms-v4.js"></script>
  <script>
    document.getElementById('termsContent').innerHTML = window.TERMS_V4.html;
    document.getElementById('v').textContent = window.TERMS_V4.version;
    document.getElementById('d').textContent = window.TERMS_V4.date;
  </script>
</body>
</html>
